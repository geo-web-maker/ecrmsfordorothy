# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo on Render and apply the blueprint, or run
#   render blueprint apply
#
# After first deploy, seed the admin user from the Render shell:
#   php artisan db:seed --class=AdminUserSeeder

services:
  - type: web
    name: ecrms
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: "NEMA eCRMS"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: ecrms-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: "NEMA eCRMS"

databases:
  - name: ecrms-db
    plan: free
    region: frankfurt
    databaseName: ecrms
    user: ecrms
