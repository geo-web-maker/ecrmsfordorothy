services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "NEMA eCRMS"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleTEyMzQ=
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ecrms
      DB_USERNAME: ecrms
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecrms
      POSTGRES_USER: ecrms
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - ecrms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecrms -d ecrms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecrms-pgdata:
